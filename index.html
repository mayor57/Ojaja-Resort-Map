<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ojaja Resort — Interactive Map</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C8963C;--gold2:#e8b84b;--dark:#2a1f00;
  --border:#d4c89a;--muted:#7a6530;--text:#2a1f00;--surface:#fffef5;
  --chalet:#D4782A;--amenity:#1A8FA0;--sports:#2E9E4A;
  --cultural:#8B5BA8;--admin:#9A7000;--landmark:#B03020;
}
body{font-family:'Lato',sans-serif;background:#f5f0d8;color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#2a1f00;border-bottom:2px solid var(--gold);z-index:100;flex-shrink:0;}
#topbar h1{font-family:'Playfair Display',serif;font-size:17px;color:#f5e6a8;white-space:nowrap;line-height:1.1;}
#topbar h1 span{font-size:10px;color:#8a7030;display:block;font-style:italic;font-family:'Lato',sans-serif;font-weight:300;}
#sw{flex:1;max-width:300px;position:relative;}
#sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.5;}
#search{width:100%;background:#1a1400;border:1px solid #4a3810;border-radius:20px;padding:7px 10px 7px 30px;color:#f5e6a8;font-family:'Lato',sans-serif;font-size:13px;outline:none;}
#search::placeholder{color:#5a4020;}
#search:focus{border-color:var(--gold);}
#gpsbtn{display:flex;align-items:center;gap:6px;background:var(--gold);border:none;border-radius:20px;padding:7px 13px;color:#2a1f00;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
#gpsbtn:hover{background:var(--gold2);}
#gpsbtn.active{background:#2E9E4A;color:#fff;}
#gpsbtn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:gp 1.4s infinite;}
@keyframes gp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}

/* FILTERS */
#filters{display:flex;gap:5px;padding:7px 12px;background:#3a2e0e;border-bottom:1px solid #5a4820;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#filters::-webkit-scrollbar{display:none;}
.fb{padding:4px 11px;border-radius:16px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(245,230,160,0.6);font-family:'Lato',sans-serif;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .18s;}
.fb.on{color:#2a1f00;border-color:transparent;}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden;position:relative;}

/* MAP */
#mapwrap{flex:1;position:relative;overflow:hidden;background:#f0ead0;touch-action:none;cursor:grab;}
#mapwrap:active{cursor:grabbing;}
#canvas{position:absolute;transform-origin:0 0;user-select:none;}
#mapimg{display:block;}

/* PIN — centered exactly on icon */
.pin{
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  z-index:5;
  transition:opacity .2s;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pin.dim{opacity:0.08;pointer-events:none;}

/* Ring indicator — sits over the icon */
.ring{
  width:38px;height:38px;
  border-radius:50%;
  border:3px solid var(--rc);
  background:rgba(0,0,0,0.12);
  box-shadow:0 0 0 2px rgba(255,255,255,0.6), inset 0 0 0 1px rgba(255,255,255,0.2);
  transition:all .2s;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.pin:hover .ring{
  background:rgba(0,0,0,0.22);
  transform:scale(1.15);
  box-shadow:0 0 0 3px rgba(255,255,255,0.8), 0 0 10px rgba(0,0,0,0.3);
}
.pin.sel{z-index:9;}
.pin.sel .ring{
  width:42px;height:42px;
  border-width:3px;
  background:rgba(0,0,0,0.18);
  box-shadow:0 0 0 3px rgba(255,255,255,0.9), 0 0 16px rgba(0,0,0,0.4);
  transform:scale(1.1);
}

/* Pulse on selected */
.pr{
  position:absolute;
  width:52px;height:52px;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border:2px solid var(--rc);
  animation:pr 1.6s infinite;
  pointer-events:none;
}
@keyframes pr{
  0%{transform:translate(-50%,-50%) scale(.6);opacity:1}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0}
}

/* GPS DOT */
#gpsdot{position:absolute;transform:translate(-50%,-50%);z-index:20;pointer-events:none;display:none;}
#gpsdot.show{display:block;}
#gpsring{position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(30,144,255,.15);border:1px solid rgba(30,144,255,.4);top:50%;left:50%;transform:translate(-50%,-50%);animation:gr 2s infinite;}
@keyframes gr{0%{transform:translate(-50%,-50%) scale(.5);opacity:.9}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
#gpscore{width:13px;height:13px;border-radius:50%;background:#1E90FF;border:2.5px solid #fff;box-shadow:0 0 10px rgba(30,144,255,.7);position:relative;z-index:2;}

/* BOTTOM SHEET */
#sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--gold);border-radius:18px 18px 0 0;z-index:50;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:72vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -4px 24px rgba(0,0,0,.12);}
#sheet.open{transform:translateY(0);}
#handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
#sdef{padding:18px 16px;text-align:center;}
#sdef h2{font-family:'Playfair Display',serif;font-size:17px;color:var(--dark);margin-bottom:5px;}
#sdef p{font-size:13px;color:var(--muted);line-height:1.6;}
#quicklist{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
#sdet{display:none;flex-direction:column;flex:1;overflow:hidden;}
#shead{padding:10px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0;}
#sicon{font-size:22px;line-height:1;}
#stitle{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);line-height:1.2;}
#scat{font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
#sclose{background:#f0ead0;border:1px solid var(--border);border-radius:50%;width:27px;height:27px;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#dirbtn{margin:10px 14px;padding:11px;background:#2a1f00;border:none;border-radius:9px;color:#f5e6a8;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;transition:background .2s;}
#dirbtn:hover{background:#4a3810;}
#dirwrap{overflow-y:auto;padding:0 14px 24px;flex:1;}
#dirfrom{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.ds{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.dn{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#f0ead0;border:1px solid var(--border);color:var(--muted);}
.dn.s{background:#2E9E4A;border-color:#2E9E4A;color:#fff;}
.dn.e{background:var(--gold);border-color:var(--gold);color:#2a1f00;}
.dt{color:#5a4020;font-size:13px;line-height:1.5;padding-top:3px;}

/* Desktop */
@media(min-width:700px){
  #sheet{position:relative;transform:none!important;border-radius:0;border-top:none;border-left:2px solid var(--gold);width:290px;flex-shrink:0;max-height:none;order:1;box-shadow:none;}
  #handle{display:none;}
  #mapwrap{order:0;}
}

/* Zoom */
#zbtns{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.zb{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,252,240,.93);color:#2a1f00;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.zb:hover{background:#fff;}

/* Legend */
#legend{position:absolute;bottom:14px;left:14px;background:rgba(255,252,240,.95);border:1px solid var(--border);border-radius:9px;padding:9px 11px;z-index:10;pointer-events:none;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.lt{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ll{font-size:10px;color:var(--muted);}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#2a1f00;border:1px solid var(--gold);color:#f5e6a8;padding:9px 16px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:all .28s;pointer-events:none;text-align:center;max-width:280px;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loader */
#loader{position:fixed;inset:0;background:#f5f0d8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#loader.hide{opacity:0;pointer-events:none;}
#loader h2{font-family:'Playfair Display',serif;font-size:26px;color:#2a1f00;margin-bottom:5px;}
#loader p{color:var(--muted);font-size:13px;}
.lbar{width:150px;height:2px;background:var(--border);border-radius:2px;margin-top:18px;overflow:hidden;}
.lfill{height:100%;background:var(--gold);animation:lf 1.2s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div id="loader">
  <h2>Ojaja Resort</h2>
  <p>Loading your map…</p>
  <div class="lbar"><div class="lfill"></div></div>
</div>

<div id="topbar">
  <h1>Ojaja Resort <span>Interactive Map</span></h1>
  <div id="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C8963C" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="Search locations…" autocomplete="off"/>
  </div>
  <button id="gpsbtn" onclick="startGPS()"><div class="dot"></div> Live Location</button>
</div>

<div id="filters">
  <button class="fb on" data-cat="all" style="background:var(--gold);color:#2a1f00;">All</button>

  adire_fac:   ["Start at the Entrance Gate","Go north then east on the upper road","Adire Factory is on the right near the eastern boundary"],
  round_s:     ["Start at the Entrance Gate","Go straight north","First Roundabout is just ahead"],
  round_c:     ["Start at the Entrance Gate","Go north through the first roundabout","Central Roundabout is the next junction"],
  entrance:    ["You are at the Entrance Gate","This is the main entry point to Ojaja Resort"],
}

const IW=2000, IH=1502
let sc=1, ox=0, oy=0, selId=null, af="all", sq="", gpsW=null, gpsOn=false, dirOpen=false

window.addEventListener("load",()=>{
  fitMap(); buildPins(); buildQuick(); setupPan(); setupSearch(); setupFilters()
  setTimeout(()=>document.getElementById("loader").classList.add("hide"),1300)
})

function fitMap(){
  const w=document.getElementById("mapwrap")
  const W=w.clientWidth, H=w.clientHeight
  sc=Math.min(W/IW, H/IH)*0.98
  ox=(W-IW*sc)/2; oy=(H-IH*sc)/2
  applyT()
}

function applyT(){
  document.getElementById("canvas").style.transform=`translate(${ox}px,${oy}px) scale(${sc})`
}

function buildPins(){
  document.querySelectorAll(".pin").forEach(p=>p.remove())
  const canvas=document.getElementById("canvas")
  LOCS.forEach(loc=>{
    const cfg=CAT[loc.cat]
    const x=(loc.px/100)*IW
    const y=(loc.py/100)*IH
    const el=document.createElement("div")
    el.className="pin"; el.id="pin-"+loc.id
    el.style.left=x+"px"
    el.style.top=y+"px"
    el.style.setProperty("--rc", cfg.color)
    el.innerHTML=`<div class="ring"></div>`
    el.addEventListener("click",e=>{e.stopPropagation();selLoc(loc.id)})
    canvas.appendChild(el)
  })
  applyFilter()
}

function applyFilter(){
  LOCS.forEach(loc=>{
    const el=document.getElementById("pin-"+loc.id); if(!el) return
    const ms=loc.name.toLowerCase().includes(sq.toLowerCase())
    const mf=af==="all"||loc.cat===af
    el.classList.toggle("dim",!(ms&&mf))
  })
}

function selLoc(id){
  if(selId){
    const o=document.getElementById("pin-"+selId)
    if(o){o.classList.remove("sel");o.querySelector(".pr")?.remove()}
  }
  if(selId===id){selId=null;closeSheet();return}
  selId=id
  const el=document.getElementById("pin-"+id)
  if(el){
    el.classList.add("sel")
    const r=document.createElement("div"); r.className="pr"
    el.appendChild(r)
    centerOn(id)
  }
  openSheet(id)
}

function centerOn(id){
  const loc=LOCS.find(l=>l.id===id); if(!loc) return
  const w=document.getElementById("mapwrap")
  const x=(loc.px/100)*IW, y=(loc.py/100)*IH
  ox=w.clientWidth/2-x*sc; oy=w.clientHeight/2-y*sc-60
  clamp(); applyT()
}

function closeSheet(){
  selId=null; dirOpen=false
  document.querySelectorAll(".pin.sel").forEach(p=>{p.classList.remove("sel");p.querySelector(".pr")?.remove()})
  document.getElementById("sheet").classList.remove("open")
  document.getElementById("sdef").style.display="block"
  document.getElementById("sdet").style.display="none"
}

function openSheet(id){
  const loc=LOCS.find(l=>l.id===id); if(!loc) return
  const cfg=CAT[loc.cat]; dirOpen=false
  document.getElementById("sicon").textContent=cfg.icon
  document.getElementById("stitle").textContent=loc.name
  document.getElementById("scat").textContent=cfg.label
  document.getElementById("scat").style.color=cfg.color
  document.getElementById("dirbtn-txt").textContent="Get Directions"
  document.getElementById("dirwrap").style.display="none"
  document.getElementById("sdef").style.display="none"
  document.getElementById("sdet").style.display="flex"
  document.getElementById("sheet").classList.add("open")
}

function toggleDir(){
  dirOpen=!dirOpen
  const w=document.getElementById("dirwrap")
  if(dirOpen){showDirs();w.style.display="block";document.getElementById("dirbtn-txt").textContent="▲ Hide Directions"}
  else{w.style.display="none";document.getElementById("dirbtn-txt").textContent="Get Directions"}
}

function showDirs(){
  const steps=DIRS[selId]
  document.getElementById("dirfrom").textContent=gpsOn?"From your current location":"From Entrance Gate"
  if(!steps){document.getElementById("dirsteps").innerHTML='<div class="dt" style="color:#7a6530">Directions not available.</div>';return}
  const arr=gpsOn?["Your live location is shown on the map (blue dot)",...steps.slice(1)]:steps
  document.getElementById("dirsteps").innerHTML=arr.map((s,i)=>`<div class="ds"><div class="dn ${i===0?"s":i===arr.length-1?"e":""}">${i===0?"▶":i===arr.length-1?"★":i}</div><div class="dt">${s}</div></div>`).join("")
}

const RB={minLat:7.395,maxLat:7.408,minLng:3.895,maxLng:3.912}
function startGPS(){
  if(gpsOn){stopGPS();return}
  if(!navigator.geolocation){showToast("⚠️ GPS not supported on this device");return}
  showToast("📡 Requesting your location…")
  const btn=document.getElementById("gpsbtn")
  btn.classList.add("active"); btn.innerHTML='<div class="dot"></div> Locating…'
  gpsW=navigator.geolocation.watchPosition(pos=>{
    gpsOn=true; btn.innerHTML='<div class="dot"></div> Live'
    const px=(pos.coords.longitude-RB.minLng)/(RB.maxLng-RB.minLng)*IW
    const py=(1-(pos.coords.latitude-RB.minLat)/(RB.maxLat-RB.minLat))*IH
    const dot=document.getElementById("gpsdot")
    dot.style.left=px+"px"; dot.style.top=py+"px"; dot.classList.add("show")
    showToast("📍 Live location active!")
  },err=>{
    let m="⚠️ Location unavailable"
    if(err.code===1) m="🔒 Location access denied — please allow in browser settings."
    if(err.code===2) m="📡 GPS signal not found. Try moving outdoors."
    showToast(m); stopGPS()
  },{enableHighAccuracy:true,maximumAge:5000,timeout:15000})
}
function stopGPS(){
  if(gpsW) navigator.geolocation.clearWatch(gpsW)
  gpsOn=false; gpsW=null
  const btn=document.getElementById("gpsbtn")
  btn.classList.remove("active"); btn.innerHTML='<div class="dot"></div> Live Location'
  document.getElementById("gpsdot").classList.remove("show")
}

function setupSearch(){document.getElementById("search").addEventListener("input",e=>{sq=e.target.value;applyFilter()})}
function setupFilters(){
  document.querySelectorAll(".fb").forEach(b=>{
    b.addEventListener("click",()=>{
      af=b.dataset.cat
      const cfg=CAT[af]
      document.querySelectorAll(".fb").forEach(x=>{x.classList.remove("on");x.style.background="";x.style.color="";x.style.borderColor=""})
      b.classList.add("on")
      if(af==="all"){b.style.background="var(--gold)";b.style.color="#2a1f00"}
      else{b.style.background=cfg.color+"25";b.style.color=cfg.color;b.style.borderColor=cfg.color+"66"}
      applyFilter()
    })
  })
}

function buildQuick(){
  const q=["reception","bar","pool_b","bush_bar","cinema","arena","adire_gal","ostrich"]
  const wrap=document.getElementById("quicklist")
  q.forEach(id=>{
    const loc=LOCS.find(l=>l.id===id); if(!loc) return
    const cfg=CAT[loc.cat]
    const b=document.createElement("button")
    b.style.cssText=`padding:5px 10px;border-radius:16px;border:1px solid ${cfg.color}55;background:${cfg.color}18;color:${cfg.color};font-size:12px;cursor:pointer;font-family:Lato,sans-serif;`
    b.textContent=cfg.icon+" "+loc.name.split(" ")[0]; b.onclick=()=>selLoc(id)
    wrap.appendChild(b)
  })
}

function setupPan(){
  const w=document.getElementById("mapwrap")
  let drag=false,lx=0,ly=0,ts=[],pd=0
  w.addEventListener("mousedown",e=>{if(e.target.closest(".pin")) return;drag=true;lx=e.clientX;ly=e.clientY})
  window.addEventListener("mousemove",e=>{if(!drag) return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;clamp();applyT()})
  window.addEventListener("mouseup",()=>drag=false)
  w.addEventListener("touchstart",e=>{ts=[...e.touches];if(ts.length===2) pd=Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY)},{passive:true})
  w.addEventListener("touchmove",e=>{
    const t=[...e.touches]
    if(t.length===2&&ts.length===2){
      const nd=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)
      const cx=(t[0].clientX+t[1].clientX)/2, cy=(t[0].clientY+t[1].clientY)/2
      zoomAt(nd/pd,cx,cy); pd=nd
    } else if(t.length===1&&ts.length>=1){
      ox+=t[0].clientX-ts[0].clientX; oy+=t[0].clientY-ts[0].clientY; clamp(); applyT()
    }
    ts=t
  },{passive:true})
  w.addEventListener("wheel",e=>{e.preventDefault();zoomAt(e.deltaY<0?1.12:0.88,e.clientX,e.clientY)},{passive:false})
}
function zoom(f){const w=document.getElementById("mapwrap");zoomAt(f,w.clientWidth/2,w.clientHeight/2)}
function zoomAt(f,cx,cy){
  const ns=Math.min(Math.max(sc*f,0.2),5)
  const r=ns/sc; ox=cx-r*(cx-ox); oy=cy-r*(cy-oy); sc=ns; clamp(); applyT()
}
function clamp(){
  const w=document.getElementById("mapwrap")
  const W=w.clientWidth, H=w.clientHeight
  ox=Math.min(W*0.8,Math.max(W-IW*sc-W*0.2,ox))
  oy=Math.min(H*0.8,Math.max(H-IH*sc-H*0.2,oy))
}

let tt
function showToast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),3500)}
document.getElementById("mapwrap").addEventListener("click",e=>{if(!e.target.closest(".pin")) closeSheet()})
window.addEventListener("resize",fitMap)
</script>
</body>
